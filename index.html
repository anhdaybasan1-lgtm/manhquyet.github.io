<!DOCTYPE html><html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trình phát nhạc cá nhân</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .player {
      background: #1e293b;
      padding: 20px;
      border-radius: 16px;
      width: 320px;
      text-align: center;
      box-shadow: 0 10px 25px rgba(0,0,0,0.5);
    }
    h2 {
      margin-bottom: 10px;
    }
    input {
      margin: 10px 0;
    }
    button {
      margin: 5px;
      padding: 10px 15px;
      border: none;
      border-radius: 10px;
      background: #3b82f6;
      color: white;
      cursor: pointer;
    }
    button:hover {
      background: #2563eb;
    }
  </style>
</head>
<body>
  <div class="player">
    <h2>🎧 Nhạc của bạn</h2>
    <input type="file" id="fileInput" accept="audio/*" multiple>
    <br>
    <audio id="audio" controls></audio>
    <div>
      <button onclick="prevSong()">⏮</button>
      <button onclick="playSong()">▶</button>
      <button onclick="pauseSong()">⏸</button>
      <button onclick="nextSong()">⏭</button>
    </div>
  </div>  <script>
    const fileInput = document.getElementById('fileInput');
    const audio = document.getElementById('audio');

    let songs = [];
    let currentIndex = 0;

    fileInput.addEventListener('change', function() {
      songs = Array.from(this.files);
      if (songs.length > 0) {
        currentIndex = 0;
        loadSong(currentIndex);
      }
    });

    function loadSong(index) {
      const file = songs[index];
      if (file) {
        audio.src = URL.createObjectURL(file);
        audio.play();
      }
    }

    function playSong() {
      audio.play();
    }

    function pauseSong() {
      audio.pause();
    }

    function nextSong() {
      if (songs.length > 0) {
        currentIndex = (currentIndex + 1) % songs.length;
        loadSong(currentIndex);
      }
    }

    function prevSong() {
      if (songs.length > 0) {
        currentIndex = (currentIndex - 1 + songs.length) % songs.length;
        loadSong(currentIndex);
      }
    }
  </script></body>
</html>
